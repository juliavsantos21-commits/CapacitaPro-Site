<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CapacitaPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDEI41ng8XESC761m6ym3NiNCm4W9JvWmM",
            authDomain: "capacitapro-d8a0c.firebaseapp.com",
            projectId: "capacitapro-d8a0c",
            storageBucket: "capacitapro-d8a0c.firebasestorage.app",
            messagingSenderId: "202290974531",
            appId: "1:202290974531:web:e611fbd9fbc196ca6d69f6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.loginComGoogle = async function() {
            try {
                console.log("🔐 Abrindo popup do Google...");
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                alert(`✅ Bem-vindo(a), ${user.displayName}! Login realizado com sucesso.`);
                window.location.href = "alunos.html";
            } catch (error) {
                console.error("❌ Erro no login:", error);
                if (error.code === "auth/unauthorized-domain") {
                    alert("Erro: Domínio não autorizado. Adicione localhost no console do Firebase.");
                } else {
                    alert("Erro ao fazer login: " + error.message);
                }
            }
        };
    </script>
</head>
<body class="login-body">

    <header class="navbar">
        <a href="index.html" class="logo-link" style="display: flex; align-items: center; text-decoration: none;">
            <img src="png.logo.png" alt="Logo CapacitaPro" style="width: 45px; height: 45px; margin-right: 12px;">
            <div class="logo-text-wrapper">
                <h1 class="brand-title">Capacita<span class="brand-pro">Pro</span></h1>
                <span class="brand-subtitle">TREINAMENTOS PROFISSIONAIS</span>
            </div>
        </a>
    </header>

    <main class="login-main-container">
        <div class="login-grid">
            <div class="login-left">
                <h2 class="login-title">Faça seu Login</h2>
                <p class="login-subtitle">Bem-vindo de volta! Insira suas informações para acessar sua conta.</p>

                <div class="glass-panel form-card">
                    <form id="form-login-sistema" onsubmit="return false;">
                        
                        <div class="input-group" style="position: relative; z-index: 5;">
                            <i class="fas fa-envelope icon-left"></i>
                            <input type="text" id="login-usuario" class="glass-input" placeholder="E-mail ou Número de Matrícula" style="position: relative; z-index: 6;">
                        </div>
                        
                        <div class="input-group" style="position: relative; z-index: 5; margin-top: 15px;">
                            <i class="fas fa-lock icon-left"></i>
                            <input type="password" id="login-senha" class="glass-input" placeholder="Senha" style="position: relative; z-index: 6; padding-right: 40px;">
                            <i class="fas fa-eye icon-right" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 7; cursor: pointer;"></i>
                        </div>

                        <div class="checkbox-group" style="margin-top: 15px;">
                            <label>
                                <input type="checkbox" checked>
                                <span class="custom-checkbox"><i class="fas fa-check"></i></span>
                                Lembrar-me
                            </label>
                        </div>

                        <button type="button" id="btn-entrar-tradicional" class="btn-green-block" style="margin-top: 20px; position: relative; z-index: 10;">Entrar</button>

                        <div class="separator-login" style="margin: 20px 0; text-align: center;">
                            <span style="background: rgba(255,255,255,0.15); padding: 5px 15px; border-radius: 20px;">ou</span>
                        </div>

                        <button type="button" class="btn-google-login" onclick="loginComGoogle()" style="position: relative; z-index: 10;">
                            <i class="fab fa-google"></i> Entrar com Google
                        </button>
                    </form>

                    <div class="form-links">
                        <div class="divider" style="text-align: center; margin: 15px 0;">
                            <span style="color: rgba(255,255,255,0.7);">Esqueceu sua senha?</span>
                        </div>
                        <p style="text-align: center;">Ainda não tem uma conta? <a href="cadastro.html" style="color: #2af598;">Cadastrar-se</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="login-footer" style="text-align: center; padding: 20px;">
        <p>Não tem uma conta? <a href="cadastro.html" style="color: #2af598;">Cadastre-se gratuitamente</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
